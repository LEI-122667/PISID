services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_pisid
      TZ: "Europe/Lisbon"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
      TZ: "Europe/Lisbon"
    depends_on:
      - mysql

  # --- MONGODB REPLICA SET ---
  mongodb1:
    image: mongo:latest
    container_name: mongodb1
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: always
    environment:
      TZ: "Europe/Lisbon"
    ports:
      - "27018:27017"
    volumes:
      - mongo1_data:/data/db
    # ADDED: Healthcheck to ensure the node is ready before others connect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb2:
    image: mongo:latest
    container_name: mongodb2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: always
    environment:
      TZ: "Europe/Lisbon"
    ports:
      - "27019:27017"
    volumes:
      - mongo2_data:/data/db
    # ADDED: Healthcheck
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb3:
    image: mongo:latest
    container_name: mongodb3
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: always
    environment:
      TZ: "Europe/Lisbon"
    ports:
      - "27020:27017"
    volumes:
      - mongo3_data:/data/db
    # ADDED: Healthcheck
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-init:
      image: mongo:latest
      container_name: mongo-init
      depends_on:
        mongodb1:
          condition: service_healthy
        mongodb2:
          condition: service_healthy
        mongodb3:
          condition: service_healthy
      entrypoint: >
        bash -c "sleep 5;
        mongosh --host mongodb1:27017 --eval '
          try {
            rs.status();
            print(\"Replica Set already configured.\");
          } catch (e) {
            print(\"Replica Set not found. Initiating...\");
            rs.initiate({
              _id: \"rs0\",
              members: [
                {_id: 0, host: \"mongodb1:27017\", priority: 2},
                {_id: 1, host: \"mongodb2:27017\", priority: 1},
                {_id: 2, host: \"mongodb3:27017\", priority: 1}
              ]
            });
          }
        '"
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: pisid_php
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./web:/var/www/html
      - ./scripts:/var/www/scripts
      - ./mazerun:/var/www/mazerun
    # CHANGED: Added service_healthy conditions to prevent PHP from crashing 
    # if it tries to connect while Mongo is still electing a primary.
    depends_on:
      mysql:
        condition: service_started
      mongodb1:
        condition: service_healthy
    environment:
      TZ: "Europe/Lisbon"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
  mongo1_data:
  mongo2_data:
  mongo3_data: